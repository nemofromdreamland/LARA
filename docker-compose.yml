services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    ports:
      - "8001:8000"
    healthcheck:
      # chromadb/chroma:latest exposes the v2 API; v1 returns 410 Gone.
      # The image has no curl/wget/python in PATH, but bash's /dev/tcp works.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000; printf \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; head -1 <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # No host port mapping: the backend is reachable only through the
    # frontend nginx proxy on the Docker network. Publishing 8000 would let
    # callers bypass the proxy and spoof rate-limit headers.
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      # curl is not in python:3.11-slim; use Python's stdlib urllib instead.
      # urlopen raises HTTPError on 4xx/5xx, so a degraded backend (503) still
      # fails the check — the frontend won't start against a half-ready stack.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_KEY=${LARA_API_KEY}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
  redis_data:
  hf_cache:
