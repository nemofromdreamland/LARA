server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────
    # Nginx inherits add_header directives only when a child location block
    # has NO add_header of its own.  The static-asset block below has one
    # (Cache-Control), so all headers must be repeated there too.
    add_header X-Content-Type-Options   "nosniff"                                    always;
    add_header X-Frame-Options          "DENY"                                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy  "default-src 'self'; style-src 'self'; font-src 'self'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (Docker service name).
    # ${LARA_API_KEY} is substituted at container startup by nginx's envsubst
    # script — it uses curly-brace syntax so nginx variables like $host are
    # left untouched (they are not environment variables, so envsubst skips them).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key ${LARA_API_KEY};
    }

    # Cache static assets aggressively.
    # Security headers must be repeated here because this block defines its
    # own add_header directive, which prevents inheritance from the server block.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control           "public, immutable"                            always;
        add_header X-Content-Type-Options  "nosniff"                                     always;
        add_header X-Frame-Options         "DENY"                                        always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()"     always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self'; font-src 'self'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;
    }
}
