name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests, no ML models)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Hard guarantee: any test that tries to fetch a Hugging Face model
      # fails loudly instead of silently downloading. There is deliberately
      # no ~/.cache/huggingface cache step in this workflow.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen --dev

      - name: Format check
        run: uv run ruff format --check app tests

      - name: Lint
        run: uv run ruff check app tests

      - name: Tests (ml-marked tests excluded, 80% coverage gate)
        run: uv run task test-light

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          build-args: |
            VITE_API_KEY=ci-dummy
